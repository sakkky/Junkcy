<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>少年探偵団 vs ジャンクシー</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap');
  
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'M PLUS Rounded 1c', sans-serif;
    background-color: #000;
    color: #f0f0f0;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  
  #game-container {
    width: 100%;
    max-width: 800px;
    height: 100dvh;
    background: #1a1a24;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* 上部ヘッダー（現在地とスコア） */
  #info-header {
    display: flex;
    justify-content: space-between;
    padding: 12px 20px;
    background: #111;
    font-size: 13px;
    color: #aaa;
    flex-shrink: 0;
    border-bottom: 1px solid #333;
  }

  /* 文章を表示する領域（画面の約2/3） */
  #text-window {
    flex: 2;
    padding: 25px 20px;
    background: linear-gradient(to bottom, #2a2a36, #1a1a24);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    box-sizing: border-box;
  }

  #character-name {
    font-weight: bold;
    font-size: 18px;
    margin-bottom: 12px;
    letter-spacing: 1px;
    flex-shrink: 0;
  }

  #message-text {
    font-size: 16px;
    line-height: 1.8;
    white-space: pre-wrap;
    flex-grow: 1;
  }

  /* タイマーバー */
  #timer-bar {
    height: 6px;
    background: #ff4757;
    width: 100%;
    transition: width 1s linear;
    display: none;
    flex-shrink: 0;
  }

  /* ボタンを配置する領域（画面の下部約1/3） */
  #choices-view {
    flex: 1;
    background: #1a1a24;
    border-top: 3px solid #555;
    padding: 20px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow-y: auto;
    box-sizing: border-box;
  }

  #choices-container {
    width: 100%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  button.choice-btn {
    background: rgba(60, 60, 80, 0.95);
    color: #fff;
    border: 2px solid #888;
    padding: 18px;
    font-size: 16px;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
    box-shadow: 0 4px 6px rgba(0,0,0,0.4);
    width: 100%;
  }

  button.choice-btn:active {
    background: #fff;
    color: #000;
    transform: translateY(2px);
    box-shadow: none;
  }

  /* キャラクターカラー */
  .color-saizo { color: #4facfe; }
  .color-monta { color: #ff758c; }
  .color-junksy { color: #f7d794; text-shadow: 0 0 5px #f7d794; }
  .color-sys { color: #a8e6cf; }

</style>
</head>
<body>

<div id="game-container">
  <div id="info-header">
    <span id="score-display">探偵Pt: 0</span>
    <span id="location-display">荒川区 某所</span>
  </div>
  
  <div id="text-window">
    <div id="character-name"></div>
    <div id="message-text"></div>
  </div>

  <div id="timer-bar"></div>

  <div id="choices-view">
    <div id="choices-container"></div>
  </div>
</div>

<script>
const se = {
  click: new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"),
  spray: new Audio("https://actions.google.com/sounds/v1/foley/spray_paint.ogg"),
  dash: new Audio("https://actions.google.com/sounds/v1/foley/footsteps_run.ogg")
};

let state = {
  score: 0,
  timerInterval: null,
  currentScene: "ep1_1"
};

const scenario = {
  // === 第1話 ===
  "ep1_1": {
    name: "システム", color: "color-sys", loc: "荒川区の教室",
    text: "第一話　『荒川区』に流れていない川\n\n「荒川区には、荒川は流れていない。」\n社会科の先生がそう言った瞬間、教室がざわついた。\n\n「え、うそでしょ」「だって名前が“荒川区”だよ？」\nみんな一斉に窓の外を見る。尾久橋通りをトラックが走り、日暮里舎人ライナーが高架を滑っていく。その少し先には、いつも遊びに行く川沿いの土手がある。水面も、橋も、ふつうにある。\nなのに「荒川はない」って、どういうことだ。",
    choices: [{ label: "先生の話を聞く", next: "ep1_2" }]
  },
  "ep1_2": {
    name: "システム", color: "color-sys", loc: "荒川区の教室",
    text: "「昔はね、今の隅田川が“荒川”って呼ばれてたんだよ」\nへえ、と誰かが声を出す。\n\n川はちゃんと流れている。ただ、名前だけが別の場所に行ってしまったらしい。だから区外の人に「荒川どこ？」って聞かれるたび、みんなちょっとだけ説明に困る。\n川はすぐそこにあるのに。名前だけが、なんだか迷子みたいだ。そんな、少しだけ不思議な街だ。",
    choices: [{ label: "教室の後ろへ", next: "ep1_3" }]
  },
  "ep1_3": {
    name: "才蔵", color: "color-saizo", loc: "教室の後ろ",
    text: "――その教室の後ろで。\n「だからさ、犯人は体育館の裏から入ったんだって」\n\nノートに校舎の見取り図を描きながら話している少年がいる。才蔵だ。細身でメガネ。いつも冷静。クイズやパズルが好きで、話すときは必ず「理由」がある。",
    choices: [{ label: "次へ", next: "ep1_4" }]
  },
  "ep1_4": {
    name: "門太", color: "color-monta", loc: "教室の後ろ",
    text: "「いやいやいや、屋根からジャンプだって！ ヒーローみたいに！」\n\n身ぶり手ぶりで大げさに動き回るのが門太。短髪で日焼けしていて、じっとしていられない。考えるより先に体が動くタイプ。足の速さは学年トップだ。\n正反対なのに、なぜかいつも一緒。クラスでは「少年探偵団コンビ」と呼ばれている。",
    choices: [{ label: "次へ", next: "ep1_5" }]
  },
  "ep1_5": {
    name: "システム", color: "color-sys", loc: "教室",
    text: "その日の朝。教室はいつもよりざわざわしていた。\n\n「昨日さ、ニュース見た？ また出たんでしょ、あいつ」\n「ジャンクシーだよ、ジャンクシー！」\n\nその名前を聞いた瞬間、みんなが学習タブレットで調べだす。\n画面に映っていたのは――壁に描かれた黒い絵。スプレーで色を吹きつけて作った、影絵みたいなシンプルなイラスト。図工の「型紙スプレー」みたいなステンシルアートだ。",
    choices: [{ label: "次へ", next: "ep1_6" }]
  },
  "ep1_6": {
    name: "門太", color: "color-monta", loc: "教室",
    text: "その絵が現れた場所では、なぜか何かが消える。落書き犯なのか、怪盗なのか。でもなぜか人気で、見物客まで来る。そんな変な存在。怪盗ジャンクシー。\n\n「一回でいいから本物見てみてえなあ……」\n門太が言う。才蔵も珍しくうなずいた。\n「どうやって忍び込んでるのか気になる」\n\nそのとき。「おーい！」校門の方から叫び声。\n「うちの学校にも出たぞー！！」",
    choices: [{ label: "現場へダッシュ！", next: "ep1_7" }]
  },
  "ep1_7": {
    name: "システム", color: "color-sys", loc: "昇降口の横",
    text: "昇降口の横の壁。そこに、黒いステンシルが描かれていた。\nシンプルな影絵みたいな子どもが、何かを抱えて走っている。\n足元にスプレー文字。JUNKSY。\n\n「本物だ……」「海外でもニュースになるってこれ！」\n先生たちまで集まってきた。「触るなー！ 教育委員会に連絡！」\nちょっとした事件現場みたいだった。そして、さらに騒ぎが大きくなったのは、その十分後。",
    choices: [{ label: "次へ", next: "ep1_8" }]
  },
  "ep1_8": {
    name: "先生たちの声", color: "color-sys", loc: "郷土資料室",
    text: "「資料室の展示がなくなってます！」\n誰かの叫び声。\n\n郷土資料室。ガラスケースの中が空っぽになっていた。\n昨日まであった、古めかしい木の板みたいなもの。昔の商店で使っていたらしい飾り物。あとは、祭りで下げる古い提灯とか。地味だけど、歴史があるやつ。\n「区から借りてたのに……」「鍵は閉まってたんですよ！」",
    choices: [{ label: "次へ", next: "ep1_9" }]
  },
  "ep1_9": {
    name: "才蔵", color: "color-saizo", loc: "郷土資料室",
    text: "「マジで盗難じゃん。うちの学校ニュース出るぞ……」と小声で言う僕に、門太が腕を組む。\n「でもさ、なんであんなガラクタ？」\n「ガラクタ言うなって。伝統工芸だぞ」\n\n荒川区の職人さんが説明してくれた、提灯の骨組みや木札の彫り。意外と手間がかかっている。\n「まあ、売っても高くなさそうだけどな」\n「じゃあなんで盗むんだよ」\n誰も答えられない。",
    choices: [{ label: "放課後、もう一度調べる", next: "ep1_10" }]
  },
  "ep1_10": {
    name: "門太", color: "color-monta", loc: "郷土資料室（放課後）",
    text: "放課後。僕らはもう一度、資料室をのぞきに行った。\n\n「町屋の倉庫」「商店街の飾り」「うちの学校の展示物」\n門太が指を折る。「共通点、なくね？」\n「古いってことくらい？」と僕は肩をすくめた。\n\nガラスケースは、きれいに空っぽだ。ほこりの跡だけが、四角く残っている。門太はしゃがみ込んで、その跡をなぞった。\n「……なあ。これさ」",
    choices: [{ label: "台座の写真パネルを見る", next: "ep1_11" }]
  },
  "ep1_11": {
    name: "才蔵", color: "color-saizo", loc: "郷土資料室",
    text: "門太が指さした古びた木の板の写真。四角くて、薄い。\n昨日のステンシル。子どもが抱えて走っていた“あれ”と、形が少し似ている。\n\n僕は写真を手に取った。まじまじと見る。\n太くて丸い線。ぐにゃっと曲がった独特の形。\n「……あ」\n「なに」\n「これ、字だ。ほら、店の名前」",
    choices: [{ label: "他の写真も確認する", next: "ep1_investigate" }]
  },
  "ep1_investigate": {
    name: "才蔵", color: "color-saizo", loc: "郷土資料室",
    text: "「まあ看板だしな」と軽く流す門太。\n僕は次の写真をめくる。提灯。赤い布に黒い線。「……これも字」\nもう一枚。のれん。白地に、太い墨。崩れた書体。でも、やっぱり文字。\n\n僕の手が止まる。無言で、さらにめくる。木札。古いポスター。\n\n全部。全部に。字。字。字。\n紙のめくれる音だけがやけに大きい。",
    choices: [
      { label: "偶然古い物が集まっただけ？", next: "ep1_wrong" },
      { label: "たまたま、じゃない。狙ってる。", next: "ep1_correct" }
    ]
  },
  "ep1_wrong": {
    name: "門太", color: "color-monta", loc: "郷土資料室",
    text: "「偶然古いもんが集まっただけじゃね？」\n「いや……それだと不自然だ。もう一度考えよう」\n（推理ポイントを逃した…）",
    action: () => { state.score -= 10; },
    choices: [{ label: "考え直す", next: "ep1_investigate" }]
  },
  "ep1_correct": {
    name: "才蔵", color: "color-saizo", loc: "郷土資料室",
    text: "「……門太。なくなってるの、全部、文字だ」\n空気が、すっと冷えた気がした。\n看板も、提灯も、のれんも。「文字が書いてある物だけ」\n\n偶然じゃない。選んでる。狙ってる。この街の、昔の文字だけを。\nぞわっと鳥肌が立つ。窓の外。夕焼けの中、黒いステンシルが浮かんでいる。\nまるで、――やっと気づいた？　そう笑っているみたいに。",
    action: () => { state.score += 30; },
    choices: [{ label: "第二話へ", next: "ep2_1" }]
  },

  // === 第2話 ===
  "ep2_1": {
    name: "システム", color: "color-sys", loc: "荒川区の学校",
    text: "第二話　泥棒か、救世主か\n\n荒川区の空気は、昨日よりそわそわしていた。校門の前にはまだ人だかり。例のステンシルは消されず、ロープで囲われている。もはや落書きじゃない。展示物だ。\n\n「……犯罪現場なのに観光地って、変なの。普通、怒るだろ？」と門太が首をかしげる。\n「うん。でも怒ってる人、あんまりいない」\nそれが気になるんだ。被害にあってるのに、“損した感じ”がしない。",
    choices: [{ label: "現場検証パート２へ", next: "ep2_2" }]
  },
  "ep2_2": {
    name: "才蔵", color: "color-saizo", loc: "郷土資料室",
    text: "「オレさ、盗むにしても、もっと金目のもんあるだろ。なんでこんなシブいのばっか？」\n「……そこが一番おかしい。“盗み”として効率が悪すぎる」\n\n僕はしゃがみこみ、ガラスケースの台座を触る。「ここ見て。ネジ、きれいに外されてる。力づくじゃない。傷もないでしょ」\n\nまるで、“展示替え”でもしたみたいに、きれいに空いている。",
    choices: [{ label: "次へ", next: "ep2_3" }]
  },
  "ep2_3": {
    name: "才蔵", color: "color-saizo", loc: "郷土資料室",
    text: "「門太、泥棒って普通もっと急ぐよね。ガシャーン！って。でもジャンクシーは違う。壊さない。散らかさない。丁寧に持っていってる」\n「……ほんとだ」\n「まるで、大事なものを“運び出してる”みたい」\n\n「引っ越し業者かよ」と門太が笑う。でも僕は笑っていなかった。",
    choices: [{ label: "次へ", next: "ep2_4" }]
  },
  "ep2_4": {
    name: "システム", color: "color-sys", loc: "郷土資料室",
    text: "そのとき、資料室の先生が段ボールを抱えて入ってきた。\n「ああ……この棚も今日で片づけかあ。校舎改修で倉庫整理しなきゃいけなくてね。置き場がもうないのよ」\n\n「でも、これって文化財じゃ……」\n「うん。でも保存会も高齢化で解散しちゃったし、引き取り手ゼロ。予算もないし……保管し続けられないの。だから最後は処分かなあ」\n仕方ないのよ。その言葉が、やけに軽く響いた。",
    choices: [{ label: "次へ", next: "ep2_5" }]
  },
  "ep2_5": {
    name: "才蔵", color: "color-saizo", loc: "廊下",
    text: "廊下に出た瞬間、僕は立ち止まった。\n「……わかったかもしれない。ジャンクシーの目的。仮説だけど……もしさ、“盗んでる”んじゃなくて――」",
    choices: [
      { label: "捨てられる前に持っていってるんだとしたら？", next: "ep2_correct2" },
      { label: "先生の代わりに片付けてるんだとしたら？", next: "ep2_wrong2" }
    ]
  },
  "ep2_wrong2": {
    name: "門太", color: "color-monta", loc: "廊下",
    text: "「そっか！ ボランティアのお掃除当番ってことだな！」\n「……いや、それだとわざわざ夜に忍び込む理由がない。もう一回考えよう」",
    action: () => { state.score -= 10; },
    choices: [{ label: "考え直す", next: "ep2_5" }]
  },
  "ep2_correct2": {
    name: "才蔵", color: "color-saizo", loc: "廊下",
    text: "「ジャンクって“ガラクタ”って意味だろ。価値がないって思われた、処分予定の物だけ消えてる。つまり、ジャンクシーは“いらない物”を集めてるんだ」\n\n子どもが、宝物みたいに抱えて走っている絵を思い出す。\n「……守ってるんだと思う。誰も守らないから、自分が守るしかないって。いちばん不器用なヒーローだ」",
    action: () => { state.score += 30; },
    choices: [{ label: "次へ", next: "ep2_6" }]
  },
  "ep2_6": {
    name: "門太", color: "color-monta", loc: "廊下",
    text: "「……ってことはさ。次に狙われるのって……」\n「“高い物”じゃない。“消される予定の物”だ」\n\nそのとき。廊下の掲示板に目が止まった。\n『来週　旧商店街アーチ撤去工事』\n老朽化・保管費不足のため撤去。味のある古い文字。\n\n「完全にジャンクシー案件じゃん……」\n少年探偵団は、初めて迷っていた。止めるのか、見届けるのか。",
    choices: [{ label: "第三話へ", next: "ep3_1" }]
  },

  // === 第3話 ===
  "ep3_1": {
    name: "システム", color: "color-sys", loc: "熊野前商店街・夜",
    text: "第三話　完全包囲網を嘲笑う『荒川』マジック\n\n怪盗ジャンクシーは、盗んでいるんじゃない。“救い出している”。\n「だからって、勝手に持ってくのはアウトだろ！」\n「うん。だから今日は捕まえて、話を聞きたい」\n\n夜の熊野前。遠くで都電荒川線が走る音。僕たちは張り込んでいた。",
    choices: [{ label: "次へ", next: "ep3_2" }]
  },
  "ep3_2": {
    name: "システム", color: "color-sys", loc: "熊野前商店街",
    text: "――カチ。金属音。\nアーチの影。黒いフード。マスク。スプレー。\nいつのまにか、立っている。\n\nシュッ、シュッ。数秒でステンシル完成。JUNKSY。\n次の瞬間、ボルトを外し始める。動きに迷いがない。丁寧すぎる。\n「やっぱ“盗み”じゃない……」",
    choices: [{ label: "「待てーーーー！！」飛び出す", next: "ep3_3" }]
  },
  "ep3_3": {
    name: "門太", color: "color-monta", loc: "都電通り",
    text: "「いや今それ言ってる場合か！」\n門太が飛び出す。怪盗、走る。速い。本気の速さだ。\n「うお、ガチだ！」\n門太のスイッチが入る。全力ダッシュ。商店街から路地、都電通りへ。\n\n同時に僕は通報した。「ジャンクシー出現！ 熊野前から北へ逃走！」",
    choices: [{ label: "次へ", next: "ep3_4" }]
  },
  "ep3_4": {
    name: "システム", color: "color-sys", loc: "荒川区内",
    text: "すぐに警察の包囲網が敷かれる。\n『尾久橋封鎖！』『明治通り止めろ！』『都電停止！』\nパトカーが交差点をふさぐ。橋が封鎖される。荒川区全体が、巨大な檻みたいになる。\n\n「もう囲まれてるぞ！詰みだろこれ！」\n――なのに。ジャンクシーは振り返りもしない。まるで、向かう先が決まっているみたいに。",
    choices: [{ label: "次へ", next: "ep3_5" }]
  },

function renderScene(sceneId) {
  const scene = scenario[sceneId];
  state.currentScene = sceneId;

  if (scene.action) scene.action();
  document.getElementById("score-display").innerText = "探偵Pt: " + state.score;
  document.getElementById("location-display").innerText = scene.loc;

  const nameEl = document.getElementById("character-name");
  nameEl.innerText = scene.name;
  nameEl.className = scene.color;
  
  const textWindow = document.getElementById("text-window");
  document.getElementById("message-text").innerText = scene.text;
  textWindow.scrollTop = 0; 

  const choicesDiv = document.getElementById("choices-container");
  choicesDiv.innerHTML = "";
  
  scene.choices.forEach(c => {
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    btn.innerText = c.label;
    btn.onclick = () => {
      clearTimeout(state.timerInterval);
      document.getElementById("timer-bar").style.display = "none";
      if(se.click) se.click.play().catch(e=>{});
      renderScene(c.next);
    };
    choicesDiv.appendChild(btn);
  });

  if (scene.time) {
    const timerBar = document.getElementById("timer-bar");
    timerBar.style.display = "block";
    timerBar.style.transition = "none";
    timerBar.style.width = "100%";
    
    setTimeout(() => {
      timerBar.style.transition = `width ${scene.time}s linear`;
      timerBar.style.width = "0%";
    }, 50);

    state.timerInterval = setTimeout(() => {
      timerBar.style.display = "none";
      renderScene(scene.timeout);
    }, scene.time * 1000);
  }
}
